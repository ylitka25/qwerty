<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster | Космический менеджер задач</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #ff6b6b 100%);
            background-size: 400% 400%;
            animation: galaxy 15s ease infinite;
            position: relative;
            padding: 40px 20px;
        }

        @keyframes galaxy {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255,215,0,0.15) 0%, transparent 50%),
                        radial-gradient(circle at 30% 70%, rgba(147,112,219,0.15) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="10" cy="10" r="1.5" fill="white" opacity="0.4"/><circle cx="30" cy="40" r="2" fill="white" opacity="0.5"/><circle cx="70" cy="20" r="1.5" fill="white" opacity="0.4"/><circle cx="90" cy="60" r="2.5" fill="white" opacity="0.6"/><circle cx="50" cy="80" r="2" fill="white" opacity="0.5"/><circle cx="20" cy="90" r="1.5" fill="white" opacity="0.4"/></svg>');
            background-size: 200px 200px;
            animation: stars 60s linear infinite;
            pointer-events: none;
        }

        @keyframes stars {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-100px) rotate(10deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 60px;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 0 2px rgba(255, 255, 255, 0.1) inset, 0 0 50px rgba(102, 126, 234, 0.3);
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #f8f0ff, #c7b9ff, #ffb6c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 50px rgba(255,255,255,0.4);
            animation: titlePulse 3s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(102, 126, 234, 0.6)); }
            50% { filter: drop-shadow(0 0 50px rgba(255, 107, 107, 0.8)); }
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 35px 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .stat-card:hover {
            transform: translateY(-10px) scale(1.03);
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-size: 1.3rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            display: block;
        }

        .stat-value {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #ffe6f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .progress-wrapper {
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 80px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .progress-bar-super {
            height: 25px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.4);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #ff6b6b, #ffb88c);
            border-radius: 50px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .add-task-panel {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 70px;
            padding: 40px;
            margin-bottom: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        #new-task {
            width: 100%;
            padding: 22px 35px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 80px;
            font-size: 1.4rem;
            color: white;
            margin-bottom: 25px;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        #new-task:focus {
            outline: none;
            border-color: #ff9a9e;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 8px rgba(255, 154, 158, 0.2), 0 0 40px rgba(255, 154, 158, 0.4);
        }

        #new-task::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            font-size: 1.4rem;
        }

        .task-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .task-options select,
        .task-options input[type="date"] {
            flex: 1;
            min-width: 200px;
            padding: 18px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 25px center;
        }

        .task-options select:hover,
        .task-options input[type="date"]:hover {
            border-color: #a78bfa;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.3);
        }

        .btn-primary {
            padding: 18px 50px;
            background: linear-gradient(135deg, #667eea, #764ba2, #ff6b6b);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.4s;
            border: 2px solid rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: 'Montserrat', sans-serif;
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 30px 50px -10px rgba(102, 126, 234, 0.6);
            background: linear-gradient(135deg, #7b8cff, #8f6bc0, #ff8585);
        }

        .filters-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 80px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .filters-panel select {
            flex: 1;
            padding: 16px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 25px center;
        }

        #task-list {
            list-style: none;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 60px;
            margin-bottom: 15px;
            padding: 25px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.4s;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .task-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateX(15px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .priority-high {
            border-left: 15px solid #ff6b6b;
            background: linear-gradient(90deg, rgba(255,107,107,0.15), rgba(255,255,255,0.05));
        }

        .priority-medium {
            border-left: 15px solid #feca57;
            background: linear-gradient(90deg, rgba(254,202,87,0.15), rgba(255,255,255,0.05));
        }

        .priority-low {
            border-left: 15px solid #48dbfb;
            background: linear-gradient(90deg, rgba(72,219,251,0.15), rgba(255,255,255,0.05));
        }

        .task-info {
            flex: 1;
        }

        .task-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            margin-bottom: 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .completed .task-title {
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.5);
            text-decoration-color: #ff9a9e;
            text-decoration-thickness: 3px;
        }

        .task-badges {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 8px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .priority-high .badge-priority {
            background: rgba(255, 107, 107, 0.3);
            border-color: #ff6b6b;
        }

        .priority-medium .badge-priority {
            background: rgba(254, 202, 87, 0.3);
            border-color: #feca57;
        }

        .priority-low .badge-priority {
            background: rgba(72, 219, 251, 0.3);
            border-color: #48dbfb;
        }

        .badge-date {
            background: rgba(255, 255, 255, 0.15);
        }

        .overdue {
            background: rgba(255, 107, 107, 0.4);
            color: #ffe6e6;
            border-color: #ff6b6b;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 10px #ff6b6b; }
            50% { box-shadow: 0 0 30px #ff6b6b; }
        }

        .delete-button {
            padding: 15px 35px;
            background: rgba(255, 107, 107, 0.2);
            border: 2px solid rgba(255, 107, 107, 0.6);
            border-radius: 50px;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 1px;
        }

        .delete-button:hover {
            background: rgba(255, 107, 107, 0.6);
            border-color: #ff6b6b;
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 15px 30px rgba(255, 107, 107, 0.5);
        }

        .empty-galaxy {
            text-align: center;
            padding: 100px 50px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            border: 3px dashed rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.6);
            font-size: 2rem;
            font-weight: 300;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 800px) {
            .container { padding: 30px; }
            h1 { font-size: 3.5rem; }
            .subtitle { font-size: 1.2rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .task-options { flex-direction: column; }
            .filters-panel { flex-direction: column; }
            .task-card { flex-direction: column; text-align: center; }
            .task-badges { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✦ TASKMASTER ✦</h1>
        <div class="subtitle">Галактическое управление задачами</div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Всего миссий</span>
                <span class="stat-value" id="total-tasks">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Выполнено</span>
                <span class="stat-value" id="completed-tasks">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Просрочено</span>
                <span class="stat-value" id="overdue-tasks">0</span>
            </div>
        </div>

        <div class="progress-wrapper">
            <div class="progress-header">
                <span>Прогресс вселенной</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-super">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <div class="add-task-panel">
            <input type="text" id="new-task" placeholder="✧ Введите название задачи...">
            <div class="task-options">
                <select id="task-priority">
                    <option value="high">🔥 Критический</option>
                    <option value="medium" selected>⚡ Обычный</option>
                    <option value="low">🌱 Низкий</option>
                </select>
                <input type="date" id="task-due-date">
                <button class="btn-primary" onclick="addTask()">➕ Запустить</button>
            </div>
        </div>

        <div class="filters-panel">
            <select id="sort-by" onchange="sortTasks()">
                <option value="priority">Сортировать по приоритету</option>
                <option value="dueDate">Сортировать по дате</option>
                <option value="title">Сортировать по названию</option>
            </select>
            <select id="filter-priority" onchange="sortTasks()">
                <option value="all">Все приоритеты</option>
                <option value="high">🔥 Критический</option>
                <option value="medium">⚡ Обычный</option>
                <option value="low">🌱 Низкий</option>
            </select>
        </div>

        <ul id="task-list"></ul>
    </div>

    <script>
        let tasks = [];

        async function fetchTasks() {
            try {
                const res = await fetch('/tasks');
                tasks = await res.json();
                updateStats();
                sortTasks();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const overdue = tasks.filter(t => {
                if (t.completed || !t.dueDate) return false;
                return new Date(t.dueDate) < new Date();
            }).length;

            document.getElementById('total-tasks').textContent = total;
            document.getElementById('completed-tasks').textContent = completed;
            document.getElementById('overdue-tasks').textContent = overdue;

            const progress = total ? Math.round((completed / total) * 100) : 0;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-percent').textContent = progress + '%';
        }

        function sortTasks() {
            const sortBy = document.getElementById('sort-by').value;
            const filterPriority = document.getElementById('filter-priority').value;

            let filteredTasks = tasks;
            if (filterPriority !== 'all') {
                filteredTasks = tasks.filter(t => t.priority === filterPriority);
            }

            const sortedTasks = [...filteredTasks].sort((a, b) => {
                if (sortBy === 'priority') {
                    const priorityWeight = { high: 3, medium: 2, low: 1 };
                    return priorityWeight[b.priority || 'medium'] - priorityWeight[a.priority || 'medium'];
                } else if (sortBy === 'dueDate') {
                    if (!a.dueDate) return 1;
                    if (!b.dueDate) return -1;
                    return new Date(a.dueDate) - new Date(b.dueDate);
                } else {
                    return a.title.localeCompare(b.title);
                }
            });

            renderTasks(sortedTasks);
        }

        function renderTasks(tasksToRender) {
            const list = document.getElementById('task-list');
            list.innerHTML = '';

            if (tasksToRender.length === 0) {
                list.innerHTML = '<div class="empty-galaxy">✨ Галактика пуста... Создайте первую задачу ✨</div>';
                return;
            }

            tasksToRender.forEach(task => {
                const li = document.createElement('li');
                li.className = `task-card priority-${task.priority || 'medium'}`;
                if (task.completed) li.classList.add('completed');

                const isOverdue = !task.completed && task.dueDate && new Date(task.dueDate) < new Date();

                li.innerHTML = `
                    <div class="task-info" onclick="toggleTask(${task.id})">
                        <div class="task-title">${task.title}</div>
                        <div class="task-badges">
                            <span class="badge badge-priority">${getPriorityLabel(task.priority)}</span>
                            ${task.dueDate ? `
                                <span class="badge badge-date ${isOverdue ? 'overdue' : ''}">
                                    🪐 ${formatDate(task.dueDate)}
                                </span>
                            ` : ''}
                        </div>
                    </div>
                    <button class="delete-button" onclick="deleteTask(${task.id})">✕ Удалить</button>
                `;

                list.appendChild(li);
            });
        }

        function getPriorityLabel(priority) {
            const labels = { high: '🔥 Критический', medium: '⚡ Обычный', low: '🌱 Низкий' };
            return labels[priority] || '⚡ Обычный';
        }

        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('ru-RU', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function addTask() {
            const input = document.getElementById('new-task');
            const priority = document.getElementById('task-priority').value;
            const dueDate = document.getElementById('task-due-date').value;

            if (!input.value.trim()) return;

            try {
                await fetch('/tasks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: input.value,
                        priority: priority,
                        dueDate: dueDate || null
                    })
                });

                input.value = '';
                document.getElementById('task-due-date').value = '';
                await fetchTasks();
            } catch (error) {
                console.error('Error adding task:', error);
            }
        }

        async function toggleTask(id) {
            try {
                await fetch('/tasks/' + id, { method: 'PUT' });
                await fetchTasks();
            } catch (error) {
                console.error('Error toggling task:', error);
            }
        }

        async function deleteTask(id) {
            try {
                await fetch('/tasks/' + id, { method: 'DELETE' });
                await fetchTasks();
            } catch (error) {
                console.error('Error deleting task:', error);
            }
        }

        fetchTasks();
    </script>
</body>
</html>
